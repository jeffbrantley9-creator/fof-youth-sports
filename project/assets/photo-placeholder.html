<!doctype html>
<html><head><meta charset="utf-8"><title>Photo placeholder</title>
<style>
  body{margin:0;font-family:"DM Sans",system-ui,sans-serif}
  .ph{
    position:relative; width:100%; aspect-ratio: var(--ratio, 4/3);
    background:
      radial-gradient(ellipse at 25% 20%, rgba(255,236,170,0.95) 0%, rgba(255,199,44,0.55) 35%, transparent 70%),
      linear-gradient(135deg, #FFE7A8 0%, #FFC57A 30%, #E8853A 70%, #7A3A1A 100%);
    color:#0E1A2B; overflow:hidden;
  }
  .ph::before{
    content:""; position:absolute; inset:0;
    background-image:
      radial-gradient(circle at 70% 75%, rgba(11,42,91,0.20) 0%, transparent 45%),
      radial-gradient(circle at 30% 80%, rgba(255,255,255,0.25) 0%, transparent 35%);
    mix-blend-mode: overlay;
  }
  .ph .badge{
    position:absolute; top:12px; left:12px;
    background: rgba(11,42,91,0.85); color:#FFC72C;
    font-weight:700; font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
    padding:5px 10px; border-radius:999px;
    display:inline-flex; align-items:center; gap:6px;
  }
  .ph .cap{
    position:absolute; bottom:14px; left:14px; right:14px;
    color:#0E1A2B; font-weight:700; font-size:14px; line-height:1.3;
    background: rgba(255,248,231,0.9); padding:8px 12px; border-radius:8px;
    backdrop-filter: blur(2px);
  }
</style></head>
<body>
  <!-- Usage:
       <iframe src="../assets/photo-placeholder.html?caption=Kids%20at%20Freedom%20Park&ratio=16/9"></iframe>
       OR copy the .ph block + modify caption directly
  -->
  <div class="ph" id="ph">
    <div class="badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7h4l2-3h6l2 3h4v12H3z"/><circle cx="12" cy="13" r="4"/></svg>
      Photo placeholder
    </div>
    <div class="cap" id="cap">Kids playing soccer · Freedom Park · golden hour</div>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    if(p.get("caption")) document.getElementById("cap").textContent = p.get("caption");
    if(p.get("ratio")) document.getElementById("ph").style.setProperty("--ratio", p.get("ratio"));
  </script>
</body></html>
