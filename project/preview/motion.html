<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="tiny" style="margin-bottom:12px">Easing curves & durations</div>
  <div style="display:grid;grid-template-columns:140px 1fr 70px;gap:10px;align-items:center;font-size:13px">
    <div><b>ease-out</b><div class="muted" style="font-size:11px">default</div></div>
    <div style="height:8px;background:#EEF3FB;border-radius:4px;position:relative"><div style="position:absolute;left:0;top:-4px;width:16px;height:16px;background:#0B2A5B;border-radius:50%;animation:e1 1.6s cubic-bezier(0.22,0.61,0.36,1) infinite"></div></div>
    <div class="muted" style="font-family:var(--font-mono);font-size:11px">200ms</div>

    <div><b>ease-back</b><div class="muted" style="font-size:11px">spring · used sparingly</div></div>
    <div style="height:8px;background:#EEF3FB;border-radius:4px;position:relative"><div style="position:absolute;left:0;top:-4px;width:16px;height:16px;background:#FFC72C;border-radius:50%;animation:e1 1.6s cubic-bezier(0.34,1.56,0.64,1) infinite"></div></div>
    <div class="muted" style="font-family:var(--font-mono);font-size:11px">360ms</div>

    <div><b>ease-in</b><div class="muted" style="font-size:11px">exit only</div></div>
    <div style="height:8px;background:#EEF3FB;border-radius:4px;position:relative"><div style="position:absolute;left:0;top:-4px;width:16px;height:16px;background:#475569;border-radius:50%;animation:e1 1.6s cubic-bezier(0.55,0,1,0.45) infinite"></div></div>
    <div class="muted" style="font-family:var(--font-mono);font-size:11px">120ms</div>
  </div>
  <div class="muted" style="margin-top:14px;font-size:12px">Hover 120ms · State 200ms · Entrance 360ms · No bounces on chrome</div>
</div>
<style>@keyframes e1{0%{left:0}50%{left:calc(100% - 16px)}100%{left:0}}</style>
</body></html>
