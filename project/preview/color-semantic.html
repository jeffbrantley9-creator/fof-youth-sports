<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#1F8A4C;color:#fff"><div><div class="name">Success</div><div style="opacity:.8;font-size:11px">field green</div></div><div class="hex">#1F8A4C</div></div>
    <div class="swatch" style="background:#D97A3C;color:#fff"><div><div class="name">Warning</div><div style="opacity:.8;font-size:11px">clay</div></div><div class="hex">#D97A3C</div></div>
    <div class="swatch" style="background:#E63946;color:#fff"><div><div class="name">Danger</div><div style="opacity:.8;font-size:11px">rally red</div></div><div class="hex">#E63946</div></div>
    <div class="swatch" style="background:#2E5DB8;color:#fff"><div><div class="name">Info</div><div style="opacity:.8;font-size:11px">link blue</div></div><div class="hex">#2E5DB8</div></div>
  </div>
  <div class="row" style="margin-top:10px">
    <div class="swatch" style="background:#FFFFFF;border:1px solid #E5E9F0"><div><div class="name">Paper</div><div style="opacity:.6;font-size:11px">surface</div></div><div class="hex">#FFFFFF</div></div>
    <div class="swatch" style="background:#FFF8E7"><div><div class="name">Cream</div><div style="opacity:.6;font-size:11px">warm canvas</div></div><div class="hex">#FFF8E7</div></div>
    <div class="swatch" style="background:#F2F4F8"><div><div class="name">Slate 50</div><div style="opacity:.6;font-size:11px">section alt</div></div><div class="hex">#F2F4F8</div></div>
    <div class="swatch dark" style="background:#0E1A2B"><div><div class="name">Ink</div><div style="opacity:.7;font-size:11px">primary text</div></div><div class="hex">#0E1A2B</div></div>
  </div>
</div>
</body></html>
