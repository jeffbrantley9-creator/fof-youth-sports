<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn{font-family:var(--font-display);font-weight:900;font-size:16px;padding:12px 24px;border-radius:999px;border:0;cursor:pointer;transition:all 200ms cubic-bezier(0.22,0.61,0.36,1);letter-spacing:-0.01em}
  .btn-primary{background:#FFC72C;color:#0B2A5B;box-shadow:0 5px 0 #8A6300, 0 10px 20px rgba(255,199,44,0.28)}
  .btn-primary:hover{background:#FFD25A}
  .btn-secondary{background:#0B2A5B;color:#fff;box-shadow:0 5px 0 #061A3A}
  .btn-ghost{background:transparent;color:#0B2A5B;border:1.5px solid #0B2A5B}
  .btn-ghost:hover{background:#EEF3FB}
  .btn-danger{background:#E63946;color:#fff;box-shadow:0 5px 0 #8A1A23}
  .btn-sm{font-size:13px;padding:8px 16px}
  .btn-lg{font-size:20px;padding:16px 32px}
</style></head><body>
<div class="card">
  <div class="row" style="flex-wrap:wrap;gap:10px">
    <button class="btn btn-primary">Register your kid</button>
    <button class="btn btn-secondary">See the schedule</button>
    <button class="btn btn-ghost">Find a league</button>
    <button class="btn btn-danger">Drop player</button>
  </div>
  <div class="row" style="flex-wrap:wrap;gap:10px;margin-top:14px;align-items:center">
    <button class="btn btn-primary btn-sm">Sign up</button>
    <button class="btn btn-primary">Sign up</button>
    <button class="btn btn-primary btn-lg">Sign up</button>
    <span class="tiny">sm · md · lg</span>
  </div>
</div>
</body></html>
