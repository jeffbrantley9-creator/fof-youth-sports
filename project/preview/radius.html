<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:12px;align-items:flex-end">
    <div style="flex:1"><div style="height:60px;background:#FFF6D6;border:1.5px solid #FFC72C;border-radius:6px"></div><div class="tiny" style="margin-top:6px">xs · 6px</div></div>
    <div style="flex:1"><div style="height:60px;background:#FFF6D6;border:1.5px solid #FFC72C;border-radius:10px"></div><div class="tiny" style="margin-top:6px">sm · 10px</div></div>
    <div style="flex:1"><div style="height:60px;background:#FFF6D6;border:1.5px solid #FFC72C;border-radius:14px"></div><div class="tiny" style="margin-top:6px">md · 14px (cards)</div></div>
    <div style="flex:1"><div style="height:60px;background:#FFF6D6;border:1.5px solid #FFC72C;border-radius:20px"></div><div class="tiny" style="margin-top:6px">lg · 20px</div></div>
    <div style="flex:1"><div style="height:60px;background:#FFF6D6;border:1.5px solid #FFC72C;border-radius:28px"></div><div class="tiny" style="margin-top:6px">xl · 28px</div></div>
    <div style="flex:1"><div style="height:60px;background:#FFF6D6;border:1.5px solid #FFC72C;border-radius:999px"></div><div class="tiny" style="margin-top:6px">pill</div></div>
  </div>
</div>
</body></html>
