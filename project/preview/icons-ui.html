<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head><body>
<div class="card">
  <div class="tiny" style="margin-bottom:14px">Lucide @ 1.75 stroke · navy · 24px (UI) · 20px (inline)</div>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:14px;color:#0B2A5B" id="grid">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="calendar-days" stroke-width="1.75"></i>schedule</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="users" stroke-width="1.75"></i>team</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="map-pin" stroke-width="1.75"></i>field</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="bell" stroke-width="1.75"></i>alerts</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="message-circle" stroke-width="1.75"></i>chat</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="credit-card" stroke-width="1.75"></i>pay</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="trophy" stroke-width="1.75"></i>winner</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="shield-check" stroke-width="1.75"></i>verified</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="user-plus" stroke-width="1.75"></i>register</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="clipboard-list" stroke-width="1.75"></i>roster</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="megaphone" stroke-width="1.75"></i>announce</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="cloud-sun" stroke-width="1.75"></i>weather</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="check-circle-2" stroke-width="1.75"></i>done</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="circle-help" stroke-width="1.75"></i>help</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="settings" stroke-width="1.75"></i>settings</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#475569"><i data-lucide="log-out" stroke-width="1.75"></i>sign out</div>
  </div>
  <script>lucide.createIcons();</script>
</div>
</body></html>
