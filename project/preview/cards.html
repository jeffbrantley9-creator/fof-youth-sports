<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="background:#F2F4F8">
  <div class="row" style="gap:14px;align-items:stretch">
    <!-- Default card -->
    <div style="flex:1;background:#fff;border-radius:14px;padding:18px;border:1px solid #E5E9F0;box-shadow:0 2px 6px rgba(11,42,91,0.08)">
      <div class="tiny" style="color:#475569">Default</div>
      <div style="font-family:var(--font-display);font-weight:800;font-size:18px;color:#0B2A5B;margin-top:6px">What to bring</div>
      <div style="font-size:13px;color:#475569;margin-top:6px;line-height:1.5">Cleats, shin guards, a water bottle with their name on it.</div>
    </div>
    <!-- Feature card with floated tag -->
    <div style="flex:1;position:relative;background:#fff;border-radius:20px;padding:22px 18px 18px;box-shadow:0 8px 20px rgba(11,42,91,0.10), 0 2px 6px rgba(11,42,91,0.06)">
      <span style="position:absolute;top:-10px;left:18px;background:#FFC72C;color:#0B2A5B;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;letter-spacing:1px;text-transform:uppercase">Featured</span>
      <div style="font-family:var(--font-display);font-weight:800;font-size:18px;color:#0B2A5B">Spring soccer</div>
      <div style="font-size:13px;color:#475569;margin-top:6px;line-height:1.5">8 weeks · Saturdays at Freedom Park · ages 5–12</div>
    </div>
    <!-- Sport card -->
    <div style="flex:1;background:#fff;border-radius:14px;padding:18px;border:1px solid #E5E9F0;box-shadow:0 2px 6px rgba(11,42,91,0.08);position:relative">
      <div style="display:flex;align-items:center;gap:8px"><span style="background:#1F8A4C;color:#fff;font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:1px">Soccer</span></div>
      <div style="font-family:var(--font-display);font-weight:800;font-size:18px;color:#0B2A5B;margin-top:8px">Sat 9:00 AM</div>
      <div style="font-size:13px;color:#475569;margin-top:4px;line-height:1.5">Lions vs Hawks · Field 3</div>
    </div>
  </div>
</div>
</body></html>
