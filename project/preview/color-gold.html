<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">

    <div style="flex:1;background:#FFC72C;color:#0B2A5B;padding:14px 18px;border-radius:14px;font-family:var(--font-display);font-weight:900;font-size:22px">Navy on gold = CTA</div>
  </div>
</div>
