<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="tiny" style="margin-bottom:14px">Spacing — 4px base · always pick from the scale</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:center;gap:14px"><div style="width:60px;font-family:var(--font-mono);font-size:12px">--sp-1</div><div style="height:14px;background:#FFC72C;width:4px;border-radius:2px"></div><div class="muted" style="font-size:12px">4 px</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:60px;font-family:var(--font-mono);font-size:12px">--sp-2</div><div style="height:14px;background:#FFC72C;width:8px;border-radius:2px"></div><div class="muted" style="font-size:12px">8 px</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:60px;font-family:var(--font-mono);font-size:12px">--sp-3</div><div style="height:14px;background:#FFC72C;width:12px;border-radius:2px"></div><div class="muted" style="font-size:12px">12 px</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:60px;font-family:var(--font-mono);font-size:12px">--sp-4</div><div style="height:14px;background:#FFC72C;width:16px;border-radius:2px"></div><div class="muted" style="font-size:12px">16 px · default gap</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:60px;font-family:var(--font-mono);font-size:12px">--sp-6</div><div style="height:14px;background:#FFC72C;width:24px;border-radius:2px"></div><div class="muted" style="font-size:12px">24 px · card padding</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:60px;font-family:var(--font-mono);font-size:12px">--sp-8</div><div style="height:14px;background:#FFC72C;width:32px;border-radius:2px"></div><div class="muted" style="font-size:12px">32 px</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:60px;font-family:var(--font-mono);font-size:12px">--sp-12</div><div style="height:14px;background:#FFC72C;width:48px;border-radius:2px"></div><div class="muted" style="font-size:12px">48 px</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:60px;font-family:var(--font-mono);font-size:12px">--sp-20</div><div style="height:14px;background:#FFC72C;width:80px;border-radius:2px"></div><div class="muted" style="font-size:12px">80 px · section gap</div></div>
  </div>
</div>
</body></html>
