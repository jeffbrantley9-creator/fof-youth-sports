<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head><body>
<div class="card">
  <div class="tiny" style="margin-bottom:14px">Sport pictograms — Phosphor regular · 32px · navy</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:18px;text-align:center">
    <div><i class="ph ph-soccer-ball" style="font-size:36px;color:#1F8A4C"></i><div class="tiny" style="margin-top:4px">Soccer</div></div>
    <div><i class="ph ph-football" style="font-size:36px;color:#D97A3C"></i><div class="tiny" style="margin-top:4px">Flag football</div></div>
    <div><i class="ph ph-basketball" style="font-size:36px;color:#C2410C"></i><div class="tiny" style="margin-top:4px">Basketball</div></div>
    <div><i class="ph ph-baseball" style="font-size:36px;color:#1E40AF"></i><div class="tiny" style="margin-top:4px">Baseball</div></div>
    <div><i class="ph ph-volleyball" style="font-size:36px;color:#7C3AED"></i><div class="tiny" style="margin-top:4px">Volleyball</div></div>
    <div><i class="ph ph-confetti" style="font-size:36px;color:#DB2777"></i><div class="tiny" style="margin-top:4px">Cheer ⚠</div></div>
  </div>
  <div class="muted" style="font-size:11px;margin-top:12px">⚠ Cheer is substituted with confetti — needs a custom pom-pom mark.</div>
</div>
</body></html>
