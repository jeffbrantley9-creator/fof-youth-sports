<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:13px;font-weight:600;color:#0B2A5B}
  .field .hint{font-size:12px;color:#475569;font-weight:400}
  .field input,.field select{font-family:var(--font-body);font-size:15px;padding:11px 14px;border:1.5px solid #CBD5E1;border-radius:10px;background:#fff;color:#0E1A2B;outline:none;transition:border 150ms}
  .field input:focus,.field select:focus{border-color:#0B2A5B;box-shadow:0 0 0 3px rgba(255,199,44,0.4)}
  .field input.err{border-color:#E63946}
  .field .errmsg{font-size:12px;color:#E63946;font-weight:600}
</style></head><body>
<div class="card">
  <div class="row" style="gap:16px">
    <div class="field" style="flex:1">
      <label>Your kid's name <span class="hint">(the one on the jersey)</span></label>
      <input value="Cooper M.">
    </div>
    <div class="field" style="flex:1">
      <label>Date of birth</label>
      <input placeholder="MM / DD / YYYY">
    </div>
  </div>
  <div class="row" style="gap:16px;margin-top:14px">
    <div class="field" style="flex:1">
      <label>Sport</label>
      <select><option>Soccer</option><option>Flag football</option></select>
    </div>
    <div class="field" style="flex:1">
      <label>Email</label>
      <input class="err" value="parent@gmail">
      <span class="errmsg">Hmm, that email doesn't look quite right.</span>
    </div>
  </div>
</div>
</body></html>
