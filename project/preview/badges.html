<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:0.02em}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
</style></head><body>
<div class="card">
  <div class="tiny" style="margin-bottom:12px">Status pills</div>
  <div class="row" style="flex-wrap:wrap;gap:8px">
    <span class="pill" style="background:#E8F5EE;color:#176A3B"><span class="dot"></span>Registered</span>
    <span class="pill" style="background:#FFF6D6;color:#8A6300">Waitlist</span>
    <span class="pill" style="background:#FCE7E9;color:#C42B36">Payment due</span>
    <span class="pill" style="background:#EEF3FB;color:#173A7A">Practice tonight</span>
    <span class="pill" style="background:#0B2A5B;color:#FFC72C"><span class="dot" style="background:#FFC72C"></span>Game on now</span>
  </div>
  <div class="tiny" style="margin:18px 0 12px">Sport tags</div>
  <div class="row" style="flex-wrap:wrap;gap:8px">
    <span class="pill" style="background:#1F8A4C;color:#fff">Soccer · U8</span>
    <span class="pill" style="background:#D97A3C;color:#fff">Flag football · U10</span>
    <span class="pill" style="background:#C2410C;color:#fff">Basketball · U12</span>
    <span class="pill" style="background:#1E40AF;color:#fff">T-ball · U6</span>
    <span class="pill" style="background:#7C3AED;color:#fff">Volleyball · U12</span>
    <span class="pill" style="background:#DB2777;color:#fff">Cheer · K–2</span>
  </div>
</div>
</body></html>
