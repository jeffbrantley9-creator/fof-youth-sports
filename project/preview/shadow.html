<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="background:#F2F4F8">
  <div class="row" style="gap:18px;flex-wrap:wrap">
    <div style="flex:1;min-width:140px;text-align:center"><div style="height:64px;background:#fff;border-radius:14px;box-shadow:0 1px 2px rgba(11,42,91,0.06)"></div><div class="tiny" style="margin-top:8px">xs · cards-flat</div></div>
    <div style="flex:1;min-width:140px;text-align:center"><div style="height:64px;background:#fff;border-radius:14px;box-shadow:0 2px 6px rgba(11,42,91,0.08)"></div><div class="tiny" style="margin-top:8px">sm · default card</div></div>
    <div style="flex:1;min-width:140px;text-align:center"><div style="height:64px;background:#fff;border-radius:14px;box-shadow:0 8px 20px rgba(11,42,91,0.10),0 2px 6px rgba(11,42,91,0.06)"></div><div class="tiny" style="margin-top:8px">md · hover/feature</div></div>
    <div style="flex:1;min-width:140px;text-align:center"><div style="height:64px;background:#fff;border-radius:14px;box-shadow:0 18px 40px rgba(11,42,91,0.14),0 4px 10px rgba(11,42,91,0.06)"></div><div class="tiny" style="margin-top:8px">lg · modals</div></div>
  </div>
  <div style="margin-top:18px;text-align:center">
    <button style="background:#FFC72C;color:#0B2A5B;border:0;padding:12px 26px;font-family:var(--font-display);font-weight:900;font-size:18px;border-radius:999px;box-shadow:0 6px 0 #8A6300, 0 12px 24px rgba(255,199,44,0.3)">Register your kid</button>
    <div class="tiny" style="margin-top:10px">Gold CTA — stacked shadow (the brand's signature)</div>
  </div>
</div>
</body></html>
